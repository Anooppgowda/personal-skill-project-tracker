<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skill & Project Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #27ae60; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #219653; }
        .skill-card { background: #ecf0f1; padding: 15px; margin-top: 15px; border-left: 5px solid #2980b9; border-radius: 4px; }
        .project-item { margin-left: 20px; background: white; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h1>💡 Personal Skill & Project Tracker</h1>
    <hr>

    <h2>1. Add a New Skill</h2>
    <div class="form-group">
        <label>Skill Name:</label>
        <input type="text" id="skillName" placeholder="e.g., FastAPI, Python, React">
    </div>
    <div class="form-group">
        <label>Skill Level:</label>
        <select id="skillLevel">
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Expert">Expert</option>
        </select>
    </div>
    <button onclick="addSkill()">Add Skill</button>

    <hr style="margin-top: 30px;">

    <h2>2. Link a Project to a Skill</h2>
    <div class="form-group">
        <label>Select Associated Skill ID:</label>
        <input type="number" id="projectSkillId" placeholder="Enter Skill ID number">
    </div>
    <div class="form-group">
        <label>Project Title:</label>
        <input type="text" id="projectTitle" placeholder="e.g., E-Commerce API">
    </div>
    <div class="form-group">
        <label>Description:</label>
        <textarea id="projectDesc" placeholder="What did you build?"></textarea>
    </div>
    <button onclick="addProject()">Add Project</button>

    <hr style="margin-top: 30px;">

    <h2>📊 Your Skills & Projects Dashboard</h2>
    <button style="background-color: #2980b9;" onclick="loadDashboard()">Refresh Dashboard</button>
    <div id="dashboard" style="margin-top: 15px;"></div>
</div>

<script>
    const API_URL = "";

    async function addSkill() {
        const name = document.getElementById('skillName').value;
        const level = document.getElementById('skillLevel').value;

        const response = await fetch(`${API_URL}/skills/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, level })
        });
        if (response.ok) {
            alert('Skill added successfully!');
            loadDashboard();
        } else {
            alert('Failed to add skill.');
        }
    }

    async function addProject() {
        const skill_id = parseInt(document.getElementById('projectSkillId').value);
        const title = document.getElementById('projectTitle').value;
        const description = document.getElementById('projectDesc').value;

        const response = await fetch(`${API_URL}/projects/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, description, skill_id })
        });
        if (response.ok) {
            alert('Project linked successfully!');
            loadDashboard();
        } else {
            alert('Failed to add project. Make sure the Skill ID exists.');
        }
    }

    async function loadDashboard() {
        const response = await fetch(`${API_URL}/skills/`);
        const skills = await response.json();
        
        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = '';

        if(skills.length === 0) {
            dashboard.innerHTML = '<p>No skills added yet.</p>';
            return;
        }

        skills.forEach(skill => {
            let projectsHtml = '';
            skill.projects.forEach(proj => {
                projectsHtml += `
                    <div class="project-item">
                        <strong>🛠️ ${proj.title}</strong> - ${proj.description}
                    </div>`;
            });

            // This section now includes your new red Delete button!
            dashboard.innerHTML += `
                <div class="skill-card">
                    <h3>ID: ${skill.id} | ${skill.name} (${skill.level})</h3>
                    <button style="background-color: #c0392b; color: white; padding: 6px 12px; font-size: 12px; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 10px;" onclick="deleteSkill(${skill.id})">Delete Skill</button>
                    <div>${projectsHtml || '<em>No projects linked to this skill yet.</em>'}</div>
                </div>`;
        });
    }

    // New JavaScript function to communicate with your app's DELETE route
    async function deleteSkill(id) {
        if (confirm("Are you sure you want to delete this skill and its associated projects?")) {
            const response = await fetch(`${API_URL}/skills/${id}`, {
                method: 'DELETE'
            });
            if (response.ok) {
                alert('Skill deleted successfully!');
                loadDashboard(); // Instantly clears it from the UI panel
            } else {
                alert('Failed to delete skill.');
            }
        }
    }

    loadDashboard();
</script>
